PointfootCfg:
  init_state:

    joint_names:
      - "J1"
      - "abad_L_Joint"
      - "abad_R_Joint"
      - "J2"
      - "hip_L_Joint"
      - "hip_R_Joint"
      - "J3"
      - "knee_L_Joint"
      - "knee_R_Joint"
      - "J4"
      - "ankle_L_Joint"
      - "ankle_R_Joint"
      - "J5"
      - "J6"
    # target angles [rad] when action = 0.0
    default_joint_angle:
      abad_L_Joint: 0.0
      hip_L_Joint: 0.0
      knee_L_Joint: 0.0
      ankle_L_Joint: 0.0

      abad_R_Joint: 0.0
      hip_R_Joint: 0.0
      knee_R_Joint: 0.0
      ankle_R_Joint: 0.0

      J1: 0.0
      J2: 0.5
      J3: 0.0
      J4: 0.0
      J5: 0.0
      J6: 0.0
    
    init_stand_joint_angle:
      abad_L_Joint: 0.0
      abad_R_Joint: 0.0
      hip_L_Joint: 0.0
      hip_R_Joint: 0.0
      knee_L_Joint: 0.0
      knee_R_Joint: 0.0
      ankle_L_Joint: 0.0
      ankle_R_Joint: 0.0
      J1: 0.0
      J2: 0.5
      J3: 0.0
      J4: 0.0
      J5: 0.0
      J6: 0.0

  ee:
    base_link: base_Link
    ee_link: link6

  ee_target:
    # If true (sim): compute EE tracking error using world/odom target pose (UMI-style), then express error in EE frame.
    # If false: keep legacy behavior (target in base frame).
    use_world_frame: true
    # If true and no world target topic is received, anchor base pose once and map base-frame target into a fixed world target
    # (so the target won't follow base drift).
    anchor_base_pose: true
    # geometry_msgs/PoseStamped topic containing target EE pose in world/odom frame.
    world_topic: "/EEPose_target_world"
    # If true and no world_topic message is received, use this fixed world target pose instead.
    # NOTE: When running publish_eepose_target_world_from_pkl.py (pushing.pkl trajectory),
    #       the pkl node publishes to world_topic and overrides this fallback automatically.
    #       manual_enable=true here serves as a safe holding pose before the pkl node starts.
    manual_enable: true
    manual_set_pos: [0.15, 0.0, 1.0]  # [x, y, z] fallback hold pose (base-frame default EE)
    manual_set_rpy: [0.0, 0.0, 0.0]   # [roll, pitch, yaw] in world/odom frame (rad)

  arx5:
    # ARX5 arm settings (used by robot_hw/PointfootHW when USE_ARX5_SDK=ON and is_sim=false).
    # This deployment path uses legacy SocketCAN `libhardware.so` only:
    #   - no soem
    #   - no solver / no ROS2 humble runtime
    model: "L5"
    can_interface: "can0"
    enable_motors_on_init: true
    # Gripper targets (meters).
    gripper_open_pos: 0.085
    gripper_close_pos: 0.0
    # Gripper mapping (meters -> motor readout rad). You may need to calibrate open_readout for your hardware.
    gripper_width: 0.088
    gripper_open_readout: 5.03
    gripper_kp: 30.0
    gripper_kd: 0.2

  control:
    # PD Drive parameters:
    leg_joint_stiffness: 40.0 #50
    leg_joint_damping: 1.8 #6

    ankle_joint_stiffness:  45.0
    ankle_joint_damping: 0.8 #1

    arm_j123_stiffness: 18
    arm_j123_damping: 1
    arm_j456_stiffness: 4
    arm_j456_damping: 0.5

    action_scale_pos: 1.0
    # action_scale_vel: 3 #4
    # NOTE: Match the RFM (IsaacLab) training setup:
    #   training sim dt = 0.005, decimation = 4  -> policy/control dt = 0.02 (50 Hz)
    # In Gazebo empty_world.world we run at 500 Hz (dt = 0.002), so we need decimation = 10 to keep 50 Hz.
    decimation: 10

    leg_joint_torque_limit: 80
    ankle_joint_torque_limit: 40
    arm_j123_torque_limit: 18
    arm_j456_torque_limit: 3
  
  gait:
    frequencies: 1.3
    swing_height: 0.12
  
  estimation:
    threshold: 0.55
    threshold_count: 100

  rfm:
    # If true, sample next_obs_latent from (mu, logvar) during inference (matches training).
    # If false, use mu directly for deterministic inference.
    sample_next_obs_latent: false

  normalization:
    encoder_normalize: True
    clip_scales:
      clip_observations: 100.
      clip_actions: 100.
    obs_scales:
      lin_vel: 1.0 #2
      ang_vel: 1.0 #0.25
      dof_pos: 1.0
      dof_vel: 1.0 #0.05
      height_measurements: 5.0

  user_cmd_scales:
    lin_vel_x: 1.5
    lin_vel_y: 1.5
    ang_vel_yaw: 1.2

  size:
    actions_size: 14 
    observations_size: 65 # matches actor input
    commands_size: 5
    obs_history_length: 10
    encoder_output_size: 67
    one_hot_encoder_output_size: 2
    gait_generator_output_size: 32

  
  imu_orientation_offset:
    roll: 0.0
    pitch: 0.00
    yaw: 0.0
